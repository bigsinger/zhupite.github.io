<div class="sidebar-card categories-card-widget">
  <h3 class="sidebar-card-title">分类</h3>
  <div class="categories-list">
    {% for category in site.categories %}
    <a href="{{ site.url }}/categories/#{{ category[0] | uri_escape }}" class="category-item">
      <span class="category-name">{{ category[0] | escape }}</span>
      <span class="category-count">{{ category[1].size }}</span>
    </a>
    {% endfor %}
  </div>
</div>
