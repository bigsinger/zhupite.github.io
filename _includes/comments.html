{% if page.comments != false and site.utterances and site.utterances.repo %}
<div id="utterances-container"
     data-utterances-repo="{{ site.utterances.repo | escape }}"
     data-utterances-issue-term="{{ site.utterances.issue_term | default: 'pathname' | escape }}"
     data-utterances-theme="{{ site.utterances.theme | default: 'github-light' | escape }}"
     data-utterances-loaded="false">
  <div id="utterances-placeholder" class="utterances-placeholder">
    <button id="utterances-load-btn" class="utterances-load-btn" type="button">查看评论</button>
  </div>
  <div id="utterances-loading" class="utterances-loading" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
    </svg>
    加载评论…
  </div>
  <div id="utterances-fallback" class="utterances-fallback" hidden>
    评论暂时加载失败。可 <a href="https://github.com/{{ site.utterances.repo | escape }}/issues" target="_blank" rel="noopener noreferrer">打开评论页</a> 查看/发表评论。
  </div>
</div>
{% endif %}
