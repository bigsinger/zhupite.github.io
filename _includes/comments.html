{% if page.comments != false and site.gitalk and site.gitalk.clientID %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.css">
<div id="gitalk-container"></div>
<script src="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('gitalk-container');
  if (!container) return;
  var gitalk = new Gitalk({
    clientID: '{{ site.gitalk.clientID }}',
    clientSecret: '{{ site.gitalk.clientSecret }}',
    repo: '{{ site.gitalk.repo }}',
    owner: '{{ site.gitalk.owner }}',
    admin: ['{{ site.gitalk.owner }}'],
    id: window.location.pathname,
    distractionFreeMode: false,
    proxy: '{{ site.gitalk.proxy | default: "https://corsproxy.io/?url=" }}'
  });
  gitalk.render('gitalk-container');
});
</script>
{% endif %}
