{% if site.components.side_bar_repo.enabled %}
<div class="sidebar-card repo-card-widget">
  <h3 class="sidebar-card-title">My Repos</h3>
  <div class="repo-list-widget">
  {% for repo in site.data.skills.repos limit: site.components.side_bar_repo.limit %}
    <a href="{{ repo.url }}" target="_blank" rel="noopener" class="repo-item">
      <span class="repo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </span>
      <span class="repo-name">{{ repo.name }}</span>
    </a>
  {% endfor %}
  </div>
</div>
{% endif %}
