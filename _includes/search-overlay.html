<!-- Mobile Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="search-overlay-icon">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="mobileSearchBox" class="search-input" placeholder="搜索文章…" autocomplete="off">
    <button class="search-overlay-close" onclick="toggleSearch()" aria-label="关闭搜索">✕</button>
  </div>
  <div class="search-overlay-body">
    <ul id="mobileSearchResults" class="search-results"></ul>
  </div>
</div>

<script>
  /* Initialize SimpleJekyllSearch for mobile overlay */
  document.addEventListener('DOMContentLoaded', function() {
    var box = document.getElementById('mobileSearchBox');
    if (!box || typeof SimpleJekyllSearch === 'undefined') return;
    SimpleJekyllSearch({
      searchInput: box,
      resultsContainer: document.getElementById('mobileSearchResults'),
      json: '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}',
      searchResultTemplate: '<li><a href="{url}" title="{title}">{title}</a></li>',
      noResultsText: 'No results found',
      limit: {{ site.simple_jekyll_search.limit }},
      fuzzy: false,
      exclude: ['Welcome']
    });
  });
</script>
