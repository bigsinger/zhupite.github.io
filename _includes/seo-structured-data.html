<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "zhupite",
  "alternateName": "朱皮特",
  "url": "https://zhupite.com",
  "description": {{ site.description | jsonify }},
  "sameAs": [
    "https://github.com/bigsinger"
  ],
  "knowsAbout": ["编程技术", "软件开发", "逆向工程"]
}
</script>

{% if page.layout == 'post' and page.title %}
<!-- BreadcrumbList structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首页",
      "item": "{{ site.url }}/"
    }
    {% if page.categories %}
    {% for cat in page.categories %}
    ,{
      "@type": "ListItem",
      "position": {{ forloop.index | plus: 1 }},
      "name": {{ cat | jsonify }},
      "item": "{{ site.url }}/categories/#{{ cat | append: '' | uri_escape }}"
    }
    {% endfor %}
    {% endif %}
    ,{
      "@type": "ListItem",
      "position": {% if page.categories %}{{ page.categories.size | plus: 2 }}{% else %}2{% endif %},
      "name": {{ page.title | jsonify }},
      "item": "{{ site.url }}{{ page.url }}"
    }
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "url": "{{ site.url }}{{ page.url }}",
  "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
  "dateModified": "{{ page.date | date: '%Y-%m-%d' }}",
  "author": {
    "@type": "Person",
    "name": "zhupite",
    "url": "https://zhupite.com"
  },
  "publisher": {
    "@type": "Person",
    "name": "zhupite",
    "url": "https://zhupite.com"
  },
  {% assign post_description = page.description %}
  {% unless post_description %}
    {% assign post_description = page.excerpt | strip_html | strip_newlines | truncate: 200 %}
  {% endunless %}
  "description": {{ post_description | jsonify }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ site.url }}{{ page.url }}"
  },
  "wordCount": "{{ page.content | strip_html | strip_newlines | remove: ' ' | size }}",
  "inLanguage": "zh-CN",
  "isAccessibleForFree": true
  {% if page.categories %}
  ,"keywords": {{ page.categories | join: ', ' | jsonify }}
  {% endif %}
}
</script>
{% endif %}

{% if page.layout == 'page' and page.title != '404' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": {{ page.title | jsonify }},
  "url": "{{ site.url }}{{ page.url }}",
  "description": {% if page.description %}{{ page.description | jsonify }}{% else %}{{ site.description | jsonify }}{% endif %},
  "isPartOf": {
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "url": "https://zhupite.com"
  },
  "inLanguage": "zh-CN"
}
</script>
{% endif %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.title | jsonify }},
  "alternateName": "朱皮特",
  "url": "https://zhupite.com",
  "description": {{ site.description | jsonify }},
  "inLanguage": "zh-CN"
}
</script>
