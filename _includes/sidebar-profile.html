<div class="sidebar-card profile-card-widget">
  <div class="profile-avatar-wrap">
    <span class="profile-avatar-letter">{{ site.author | slice: 0, 1 | upcase }}</span>
  </div>
  <h3 class="profile-name">{{ site.title }}</h3>
  <p class="profile-bio">{{ site.description | truncate: 80 }}</p>
  <div class="profile-social-row">
    <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" title="GitHub" class="social-icon-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
    </a>
    <a href="{{ site.url }}{{ site.subscribe_rss }}" target="_blank" rel="noopener" title="RSS" class="social-icon-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
    </a>
    <a href="mailto:{{ site.email }}" title="Email" class="social-icon-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
    </a>
  </div>
</div>
