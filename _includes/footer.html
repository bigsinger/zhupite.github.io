    </div><!-- /main-wrapper -->

    <footer class="site-footer-modern">
      <div class="footer-container">
        <div class="footer-info">
          <div class="footer-brand">
            <span class="brand-avatar small">{{ site.author | slice: 0, 1 | upcase | escape }}</span>
            <span class="footer-brand-name">{{ site.title | escape }}</span>
          </div>
          <p class="footer-desc">{{ site.description | escape }}</p>
          <div class="footer-links">
            <span>&copy; {{ site.time | date: '%Y' }}</span>
            <span title="{{ site.author | escape }}">{{ site.author | escape }}</span>
            <span>总访问 <span id="busuanzi_value_site_pv">...</span></span>
          </div>
        </div>
        <div class="footer-social">
          <a href="https://github.com/{{ site.github_username | uri_escape }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
          </a>
          <a href="{{ site.url }}{{ site.subscribe_rss | escape }}" target="_blank" rel="noopener noreferrer" aria-label="RSS">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
          </a>
          <a href="mailto:{{ site.email | uri_escape }}" aria-label="Email">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          </a>
        </div>
      </div>
    </footer>

    <div class="tools-wrapper">
      <a class="gotop" href="#" title="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </a>
    </div>

    <!-- Mobile TOC floating button -->
    <button class="toc-mobile-btn" id="tocMobileBtn" aria-label="打开文章目录" aria-controls="tocMobileOverlay" aria-expanded="false" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"></line>
        <line x1="4" y1="12" x2="20" y2="12"></line>
        <line x1="4" y1="18" x2="20" y2="18"></line>
      </svg>
    </button>

    <!-- Mobile TOC overlay — drawer from bottom -->
    <div class="toc-mobile-overlay" id="tocMobileOverlay" aria-hidden="true">
      <div class="toc-mobile-drawer">
        <div class="toc-drawer-header">
          <span class="toc-drawer-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>文章目录</span>
          <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭" type="button">✕</button>
        </div>
        <div class="toc-drawer-body">
          <ul class="toc-list" id="toc-mobile-list"></ul>
        </div>
      </div>
    </div>
</body>
</html>
