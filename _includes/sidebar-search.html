<div class="sidebar-card search-card-widget">
  <h3 class="sidebar-card-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:6px">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    搜索
  </h3>
  <div id="site_search">
    <input type="text" id="search_box" class="search-input" placeholder="搜索文章…">
  </div>
  <ul id="search_results" class="search-results"></ul>
</div>

<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function() {
  if (typeof SimpleJekyllSearch === 'undefined') return;
  /* Sidebar search */
  var sidebarBox = document.getElementById('search_box');
  var sidebarResults = document.getElementById('search_results');
  var json = '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}';
  var tmpl = '<li><a href="{url}" title="{title}">{title}</a></li>';
  if (sidebarBox && sidebarResults) {
    SimpleJekyllSearch({
      searchInput: sidebarBox,
      resultsContainer: sidebarResults,
      json: json,
      searchResultTemplate: tmpl,
      noResultsText: 'No results found',
      limit: {{ site.simple_jekyll_search.limit }},
      fuzzy: false,
      exclude: ['Welcome']
    });
  }
  /* Mobile overlay search (same init, different elements) */
  var mobileBox = document.getElementById('mobileSearchBox');
  var mobileResults = document.getElementById('mobileSearchResults');
  if (mobileBox && mobileResults) {
    SimpleJekyllSearch({
      searchInput: mobileBox,
      resultsContainer: mobileResults,
      json: json,
      searchResultTemplate: tmpl,
      noResultsText: 'No results found',
      limit: {{ site.simple_jekyll_search.limit }},
      fuzzy: false,
      exclude: ['Welcome']
    });
  }
});
</script>
