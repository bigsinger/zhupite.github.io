<div class="sidebar-card search-card-widget">
  <h3 class="sidebar-card-title">Search</h3>
  <div id="site_search">
    <input type="text" id="search_box" class="search-input" placeholder="搜索文章…">
  </div>
  <ul id="search_results" class="search-results"></ul>
</div>

<script src="{{ assets_base_url }}/assets/js/simple-jekyll-search.min.js" defer></script>
<script type="text/javascript">
SimpleJekyllSearch({
    searchInput: document.getElementById('search_box'),
    resultsContainer: document.getElementById('search_results'),
  {% if site.cdn.jsdelivr.enabled and site.url contains 'mazhuang.org' %}
    json: 'https://fastly.jsdelivr.net/gh/mzlogin/mzlogin.github.io@built/assets/search_data.json?v={{ "now" | date: "%s"}}',
  {% else %}
    json: '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}',
  {% endif %}
    searchResultTemplate: '<li><a href="{url}" title="{title}">{title}</a></li>',
    noResultsText: 'No results found',
    limit: {{ site.simple_jekyll_search.limit }},
    fuzzy: false,
    exclude: ['Welcome']
})
</script>
