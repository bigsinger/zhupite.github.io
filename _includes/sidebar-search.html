<div class="sidebar-card search-card-widget">
  <h3 class="sidebar-card-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:6px">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    搜索
  </h3>
  <div id="site_search">
    <input type="text" id="search_box" class="search-input" placeholder="搜索文章…">
  </div>
  <ul id="search_results" class="search-results"></ul>
</div>

<script type="text/javascript">
(function() {
  /* SimpleJekyllSearch 内部使用共享变量 a，创建多个实例会导致异步回调错绑。
     改用 fetch + 原生轻量搜索，侧栏和移动覆盖层各自独立的 keyup 监听器。 */
  var jsonUrl = '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}';
  var tmpl = '<li><a href="{url}" title="{title}">{title}</a></li>';
  var limit = {{ site.simple_jekyll_search.limit }};
  var noResultsText = '{{ site.simple_jekyll_search.no_results_text | default: "No results found" }}';
  var exclude = ['Welcome'];

  var searchData = [];

  /* ---- 使用 fetch 加载搜索数据 ---- */
  fetch(jsonUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      searchData = data;
    })
    .catch(function() { /* 加载失败时搜索功能不可用，静默处理 */ });

  /* ---- 搜索函数 ---- */
  function doSearch(term, container) {
    if (!term) { container.innerHTML = ''; return; }
    term = term.toLowerCase();

    var results = [];
    for (var i = 0; i < searchData.length && results.length < limit; i++) {
      var item = searchData[i];

      // 排除
      var excluded = false;
      for (var e = 0; e < exclude.length; e++) {
        if (new RegExp(exclude[e], 'i').test(item.title || '')) {
          excluded = true;
          break;
        }
      }
      if (excluded) continue;

      // 匹配 title / keywords / category
      if (
        (item.title && item.title.toLowerCase().indexOf(term) >= 0) ||
        (item.keywords && item.keywords.toLowerCase().indexOf(term) >= 0) ||
        (item.category && item.category.toLowerCase().indexOf(term) >= 0)
      ) {
        results.push(item);
      }
    }

    container.innerHTML = results.length
      ? results.map(function(item) {
          return tmpl
            .replace(/\{url\}/g, item.url)
            .replace(/\{title\}/g, item.title);
        }).join('')
      : noResultsText;
  }

  /* ---- 绑定事件 ---- */
  var ignoreKeys = [13, 16, 20, 37, 38, 39, 40, 91];

  document.addEventListener('DOMContentLoaded', function() {
    var sidebarBox = document.getElementById('search_box');
    var sidebarResults = document.getElementById('search_results');
    var mobileBox = document.getElementById('mobileSearchBox');
    var mobileResults = document.getElementById('mobileSearchResults');

    /* 侧栏 */
    if (sidebarBox && sidebarResults) {
      sidebarBox.addEventListener('keyup', function(e) {
        if (ignoreKeys.indexOf(e.which) >= 0) return;
        doSearch(e.target.value, sidebarResults);
      });
    }

    /* 移动覆盖层 */
    if (mobileBox && mobileResults) {
      mobileBox.addEventListener('keyup', function(e) {
        if (ignoreKeys.indexOf(e.which) >= 0) return;
        doSearch(e.target.value, mobileResults);
      });
    }
  });
})();
</script>
