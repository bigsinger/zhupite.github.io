<div class="sidebar-card search-card-widget">
  <h3 class="sidebar-card-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:6px">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    搜索
  </h3>
  <div id="site_search">
    <input type="text" id="search_box" class="search-input" placeholder="搜索文章…">
  </div>
  <ul id="search_results" class="search-results"></ul>
</div>

<script type="text/javascript">
(function() {
  /* SimpleJekyllSearch 的全局数据存储 a 是共享的。
     只创建 ONE 个实例（侧栏）来加载 JSON 数据。
     移动覆盖层的搜索使用自定义 keyup 监听器，复用侧栏实例的 search() 方法。 */
  var jsonUrl = '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}';
  var tmpl = '<li><a href="{url}" title="{title}">{title}</a></li>';
  var limit = {{ site.simple_jekyll_search.limit }};
  var opts = {
    searchResultTemplate: tmpl,
    noResultsText: 'No results found',
    limit: limit,
    fuzzy: false,
    exclude: ['Welcome']
  };

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof SimpleJekyllSearch === 'undefined') return;

    var sidebarBox = document.getElementById('search_box');
    var sidebarResults = document.getElementById('search_results');
    var mobileBox = document.getElementById('mobileSearchBox');
    var mobileResults = document.getElementById('mobileSearchResults');

    if (!sidebarBox || !sidebarResults) return;

    /* 唯一实例：侧栏搜索，加载 JSON */
    var sjs = SimpleJekyllSearch({
      searchInput: sidebarBox,
      resultsContainer: sidebarResults,
      json: jsonUrl,
      searchResultTemplate: opts.searchResultTemplate,
      noResultsText: opts.noResultsText,
      limit: opts.limit,
      fuzzy: opts.fuzzy,
      exclude: opts.exclude
    });

    /* 移动覆盖层搜索：自定义 keyup，复用 sjs.search() */
    if (mobileBox && mobileResults) {
      mobileBox.addEventListener('keyup', function(e) {
        /* 忽略修饰键 */
        var ignore = [13, 16, 20, 37, 38, 39, 40, 91];
        if (ignore.indexOf(e.which) !== -1) return;

        var term = e.target.value.trim();
        if (!term) { mobileResults.innerHTML = ''; return; }

        var results = sjs.search(term);
        if (results && results.length > 0) {
          mobileResults.innerHTML = results.map(function(item) {
            return tmpl
              .replace(/\{url\}/g, item.url)
              .replace(/\{title\}/g, item.title);
          }).join('');
        } else {
          mobileResults.innerHTML = opts.noResultsText;
        }
      });
    }
  });
})();
</script>
