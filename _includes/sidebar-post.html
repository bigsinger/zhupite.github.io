<!-- Desktop TOC — sticky on large screens -->
<div class="sidebar-card toc-card-widget" id="toc-sidebar">
  <h3 class="sidebar-card-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>文章目录</h3>
  <div class="toc-content">
    <ul class="toc-list" id="toc-list-generated"></ul>
  </div>
</div>

<!-- Mobile TOC floating button — only visible on small screens -->
<button class="toc-mobile-btn" id="tocMobileBtn" aria-label="打开文章目录">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="18" x2="20" y2="18"></line>
  </svg>
</button>

<!-- Mobile TOC overlay — drawer from bottom -->
<div class="toc-mobile-overlay" id="tocMobileOverlay">
  <div class="toc-mobile-drawer">
    <div class="toc-drawer-header">
      <span class="toc-drawer-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>文章目录</span>
      <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭">✕</button>
    </div>
    <div class="toc-drawer-body">
      <ul class="toc-list" id="toc-mobile-list"></ul>
    </div>
  </div>
</div>
