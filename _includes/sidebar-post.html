<!-- Desktop TOC — sticky on large screens -->
<div class="sidebar-card toc-card-widget" id="toc-sidebar">
  <h3 class="sidebar-card-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>文章目录</h3>
  <div class="toc-content">
    <ul class="toc-list" id="toc-list-generated"></ul>
  </div>
</div>

<!-- Mobile TOC floating button — only visible on small screens -->
<button class="toc-mobile-btn" id="tocMobileBtn" aria-label="打开文章目录">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="18" x2="20" y2="18"></line>
  </svg>
</button>

<!-- Mobile TOC overlay — drawer from bottom -->
<div class="toc-mobile-overlay" id="tocMobileOverlay">
  <div class="toc-mobile-drawer">
    <div class="toc-drawer-header">
      <span class="toc-drawer-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>文章目录</span>
      <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭">✕</button>
    </div>
    <div class="toc-drawer-body">
      <ul class="toc-list" id="toc-mobile-list"></ul>
    </div>
  </div>
</div>

<script>
(function() {
  var tocCard = document.getElementById('toc-sidebar');
  if (!tocCard) return;
  var main = document.querySelector('.main-content');
  if (!main) {
    tocCard.style.display = 'none';
    var mb = document.getElementById('tocMobileBtn');
    if (mb) mb.style.display = 'none';
    return;
  }
  var hs = main.querySelectorAll('h1, h2, h3, h4');
  if (hs.length < 2) {
    tocCard.style.display = 'none';
    var mb = document.getElementById('tocMobileBtn');
    if (mb) mb.style.display = 'none';
    return;
  }
  var list = document.getElementById('toc-list-generated');
  var mobileList = document.getElementById('toc-mobile-list');
  if (!list) return;

  var tocHtml = '';
  for (var i = 0; i < hs.length; i++) {
    var h = hs[i];
    if (!h.id) h.id = 'toc-' + i;
    var tag = (h.tagName || '').toLowerCase();
    var cls = 'toc-h1';
    if (tag === 'h2') cls = 'toc-h2';
    else if (tag === 'h3') cls = 'toc-h3';
    else if (tag === 'h4') cls = 'toc-h4';
    var text = (h.textContent || '').trim();
    tocHtml += '<li class="' + cls + '"><a href="#' + h.id + '">' + text + '</a></li>';
  }
  list.innerHTML = tocHtml;
  if (mobileList) mobileList.innerHTML = tocHtml;

  // Scroll highlight handled in main.js

  var btn = document.getElementById('tocMobileBtn');
  var overlay = document.getElementById('tocMobileOverlay');
  var closeBtn = document.getElementById('tocDrawerClose');
  if (btn && overlay) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    function closeOverlay() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    if (closeBtn) {
      closeBtn.addEventListener('click', closeOverlay);
    }
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeOverlay();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeOverlay();
    });
  }
})();
</script>
