<!-- Desktop TOC — sticky on large screens -->
<div class="sidebar-card toc-card-widget" id="toc-sidebar">
  <h3 class="sidebar-card-title">📖 文章目录</h3>
  <div class="toc-content">
    <ul class="toc-list" id="toc-list-generated"></ul>
  </div>
</div>

<!-- Mobile TOC floating button — only visible on small screens -->
<button class="toc-mobile-btn" id="tocMobileBtn" aria-label="打开文章目录">📖</button>

<!-- Mobile TOC overlay — drawer from bottom -->
<div class="toc-mobile-overlay" id="tocMobileOverlay">
  <div class="toc-mobile-drawer">
    <div class="toc-drawer-header">
      <span class="toc-drawer-title">📖 文章目录</span>
      <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭">✕</button>
    </div>
    <div class="toc-drawer-body">
      <ul class="toc-list" id="toc-mobile-list"></ul>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var tocCard = document.getElementById('toc-sidebar');
  if (!tocCard) return;

  // Try to find article headings: .article-content or .post-detail
  var article = document.querySelector('.article-content') || document.querySelector('.post-detail');

  if (!article) {
    tocCard.style.display = 'none';
    var mb = document.getElementById('tocMobileBtn');
    if (mb) mb.style.display = 'none';
    return;
  }

  // Get all heading elements
  var headings = [];
  var hs = article.querySelectorAll('h2, h3, h4');
  for (var i = 0; i < hs.length; i++) { headings.push(hs[i]); }

  if (headings.length < 2) {
    tocCard.style.display = 'none';
    var mb = document.getElementById('tocMobileBtn');
    if (mb) mb.style.display = 'none';
    return;
  }

  var list = document.getElementById('toc-list-generated');
  var mobileList = document.getElementById('toc-mobile-list');
  if (!list) return;

  // Generate TOC HTML
  var tocHtml = '';
  for (var i = 0; i < headings.length; i++) {
    var h = headings[i];
    if (!h.id) { h.id = 'toc-' + i; }
    var tag = h.tagName.toLowerCase();
    var cls = tag === 'h2' ? 'toc-h2' : (tag === 'h3' ? 'toc-h3' : (tag === 'h4' ? 'toc-h4' : 'toc-h2'));
    tocHtml += '<li class="' + cls + '"><a href="#' + h.id + '">' + (h.textContent || '').trim() + '</a></li>';
  }
  list.innerHTML = tocHtml;
  if (mobileList) mobileList.innerHTML = tocHtml;

  // --- Active section tracking via IntersectionObserver ---
  var allLinks = list.querySelectorAll('a');
  if (allLinks.length > 0 && typeof IntersectionObserver !== 'undefined') {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        var targetId = decodeURIComponent(entry.target.id);
        // Find matching TOC link
        var tocLink = null;
        for (var i = 0; i < allLinks.length; i++) {
          var href = allLinks[i].getAttribute('href');
          if (href === '#' + targetId || href.indexOf('#' + targetId) !== -1) {
            tocLink = allLinks[i];
            break;
          }
        }
        if (entry.isIntersecting && tocLink) {
          for (var i = 0; i < allLinks.length; i++) {
            allLinks[i].parentElement.classList.remove('toc-active');
          }
          tocLink.parentElement.classList.add('toc-active');
        }
      });
    }, { rootMargin: '-20px 0px -60% 0px' });

    for (var i = 0; i < headings.length; i++) {
      observer.observe(headings[i]);
    }
  }

  // --- Mobile toggle: floating button → overlay drawer ---
  var btn = document.getElementById('tocMobileBtn');
  var overlay = document.getElementById('tocMobileOverlay');
  var closeBtn = document.getElementById('tocDrawerClose');

  if (btn && overlay) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    function closeOverlay() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    if (closeBtn) {
      closeBtn.addEventListener('click', closeOverlay);
    }

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeOverlay();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeOverlay();
    });
  }
});
</script>
