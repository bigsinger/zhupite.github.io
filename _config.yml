# ===== 站点信息 =====
baseurl:
url: https://zhupite.com
date_format: "ordinal"
title: 朱皮特的烂笔头
subtitle: "自由的飞翔"
description: "你不必等到非常厉害，才敢开始；你需要开始，才会变得非常厉害！"
keywords: 朱皮特, 程序员
timezone: Asia/Shanghai
encoding: "utf-8"
repository: bigsinger/zhupite.github.io

# ===== 作者信息 =====
author: zhupite
github_username: bigsinger
email: pushebp#163.com

# ===== 导航 =====
navs:
  - href: /
    label: 首页
  - href: /categories/
    label: 分类
  - href: /archives/
    label: 文章
  - href: /links/
    label: 链接
  - href: /about/
    label: 关于

# ===== RSS =====
subscribe_rss: /feed.xml

# ===== Jekyll 构建配置 =====
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge
paginate: 10
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:categories/:title.html

plugins:
  - jekyll-github-metadata
  - rouge
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jemoji

# ===== 压缩 =====
compress_html:
  clippings: all

# ===== 文章字数统计 =====
components:
  word_count:
    enabled: true

# ===== 搜索 =====
simple_jekyll_search:
  fulltext: false
  limit: 20

# ===== Google =====
google:
  analytics_id: G-LXMGB07CK3
  adsense:
    publisher_id: pub-8721821812073236
    footer: true
    sidebar: true
    content_header: true
    content_footer: false
