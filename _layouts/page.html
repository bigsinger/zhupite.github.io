---
layout: default
---

<div class="page-detail">
  <header class="page-detail-header">
    <h1 class="page-detail-title">{{ page.title | escape }}</h1>
    {% if page.subtitle %}
    <p class="page-detail-subtitle">{{ page.subtitle | escape }}</p>
    {% endif %}
  </header>

  <article class="article-content markdown-body">
    {{ content }}
  </article>

  <div class="comment">
    {% include comments.html %}
  </div>
</div>
